name: CI Pipeline

# Pipeline sẽ tự động chạy khi có code push lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  # Job 1: Chạy kiểm thử tự động
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy source code
        uses: actions/checkout@v3
        
      - name: Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Cài đặt thư viện và Chạy Test
        working-directory: ./app
        run: |
          npm install
          npm test

  # Job 2: Đóng gói và đẩy Image lên kho chứa
  build-and-push:
    needs: test # QUAN TRỌNG: Chỉ chạy Job này nếu Job 'test' ở trên báo PASS
    runs-on: ubuntu-latest
    steps:
      - name: Lấy source code
        uses: actions/checkout@v3

      - name: Đăng nhập vào Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build và Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          # Gắn tag latest cho image
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-demo-app:latest