

services:
  # Môi trường Blue
  app-blue:
    image: BIAYCIII/devops-demo-app:latest
    container_name: app-blue
    ports:
      - "8081:8080" # Map ra port 8081 để dễ test trực tiếp nếu cần
      
  # Môi trường Green
  app-green:
    image: <TÊN_DOCKER_HUB_CỦA_BẠN>/devops-demo-app:latest
    container_name: app-green
    ports:
      - "8082:8080" # Map ra port 8082

  # Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-blue
      - app-green

  # CI/CD Server
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock 
      - /usr/bin/docker:/usr/bin/docker

volumes:
  jenkins_data: