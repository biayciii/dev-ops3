upstream backend {
    # Hiện tại hệ thống đang trỏ vào môi trường Blue
    # Khi Jenkins deploy, nó sẽ tự động đổi dòng này thành app-green:8080
    server app-blue:8080; 
}

server {
    listen 80;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}